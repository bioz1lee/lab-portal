<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Korea University Shield/Globe Mark - simplified -->
  <circle cx="100" cy="100" r="90" stroke="currentColor" stroke-width="5" fill="none"/>
  <circle cx="100" cy="100" r="72" stroke="currentColor" stroke-width="2.5" fill="none" opacity="0.4"/>
  <!-- Globe latitude lines -->
  <ellipse cx="100" cy="100" rx="90" ry="35" stroke="currentColor" stroke-width="2" fill="none" opacity="0.3"/>
  <ellipse cx="100" cy="100" rx="90" ry="60" stroke="currentColor" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- Globe longitude lines -->
  <ellipse cx="100" cy="100" rx="35" ry="90" stroke="currentColor" stroke-width="2" fill="none" opacity="0.3"/>
  <ellipse cx="100" cy="100" rx="60" ry="90" stroke="currentColor" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- Center cross / meridian -->
  <line x1="100" y1="10" x2="100" y2="190" stroke="currentColor" stroke-width="2" opacity="0.3"/>
  <line x1="10" y1="100" x2="190" y2="100" stroke="currentColor" stroke-width="2" opacity="0.3"/>
  <!-- KU text -->
  <text x="100" y="115" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="52" font-weight="700" fill="currentColor">KU</text>
</svg>
